version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: petal
      POSTGRES_PASSWORD: petal
      POSTGRES_DB: petalplan
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://petal:petal@db:5432/petalplan
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
